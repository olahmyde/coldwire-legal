<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
</head>
<body>
  <div class="bg-grid" aria-hidden="true"></div>
  <div class="bg-scanline" aria-hidden="true"></div>

  <div class="shell">
    <header class="site-header">
      <div class="wire wire-pulse" aria-hidden="true"></div>
      <p class="wordmark">{{ site.title }}</p>
      <h1 class="page-title">{{ page.title | default: site.title }}</h1>
      {% if page.effective_date %}
        <p class="meta">Effective date · {{ page.effective_date }}</p>
      {% endif %}
    </header>

    <main class="content">
      {{ content }}
    </main>

    <footer class="site-footer">
      <p>
        {{ site.title }} · <span class="pkg">com.coldwire.game</span><br />
        Canonical privacy policy URL for App Store and Google Play listings.
      </p>
    </footer>
  </div>
</body>
</html>
